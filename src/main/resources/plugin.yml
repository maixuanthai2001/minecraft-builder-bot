name: BuilderBot
version: 1.0.0
main: com.builderbot.BuilderBot
api-version: 1.20
description: Auto builder bot that builds random structures on empty land
author: BuilderBot

commands:
  builderbot:
    description: Control the builder bot
    usage: /builderbot <start|stop|status>
    permission: builderbot.admin

permissions:
  builderbot.admin:
    description: Allows controlling the builder bot
    default: op
